<app-page-title>My Repertoire Shelf</app-page-title>

<section class="searchbar">
  <app-clef-input name="searchbar" type="text" label="Find your piece"></app-clef-input>
</section>

<section class="shelf-container">
  @for (book of books; track book.title) {
    <app-book
      [title]="book.title"
      [composer]="book.composer"
      [classification]="book.classification || ''"
    ></app-book>
  }
</section>
