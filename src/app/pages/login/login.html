<form (submit)="onSubmit($event)">
  <app-pentagram>
    <app-input id="username" type="email" label="Email" [formField]="loginForm.email"></app-input>
  </app-pentagram>

  <app-pentagram>
    <app-input
      id="password"
      type="password"
      label="Password"
      [formField]="loginForm.password"
    ></app-input>
  </app-pentagram>

  <button type="submit">LOGIN</button>
</form>
