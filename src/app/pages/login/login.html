<form (submit)="onSubmit($event)">
  <app-pentagram>
    <app-clef-input
      id="username"
      type="email"
      label="Email"
      [formField]="loginForm.email"
    ></app-clef-input>
  </app-pentagram>

  <app-pentagram>
    <app-clef-input
      id="password"
      type="password"
      label="Password"
      [formField]="loginForm.password"
    ></app-clef-input>
  </app-pentagram>

  <button type="submit">LOGIN</button>
</form>
