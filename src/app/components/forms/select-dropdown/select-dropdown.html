<label class="floating-label" [for]="id()">{{ label() }}</label>

<select
  #selectElement
  class="form-field"
  [id]="id()"
  [value]="value()"
  [class.error]="touched() && invalid()"
  (change)="value.set(selectElement.value)"
  (blur)="touched.set(true)"
  placeholder=" "
>
  <option value="" disabled selected hidden></option>

  @for (option of options(); track option) {
    <option [value]="option">{{ option }}</option>
  }
</select>

@if (touched() && invalid()) {
  <ul class="error-messages" role="alert">
    @for (error of errors().slice(0, 2); track error) {
      <li class="error">{{ error.message }}</li>
    }
  </ul>
}
